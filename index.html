<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Happy Birthday 🧡</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:linear-gradient(135deg,#ff6b35 0%,#ff8c42 25%,#ffa500 50%,#ffb84d 75%,#ff9a56 100%);background-size:400% 400%;animation:romanticGlow 8s ease infinite;color:#fff;font-family:'Poppins',sans-serif;font-weight:500;min-height:100vh;width:100vw}
@keyframes romanticGlow{0%{background-position:0 50%;filter:brightness(1)}50%{background-position:100% 50%;filter:brightness(1.08)}100%{background-position:0 50%;filter:brightness(1)}}
.page{position:fixed;inset:0;display:flex;justify-content:center;align-items:center;flex-direction:column;padding:25px;transition:.8s;height:100vh;width:100vw}
.hide{opacity:0;pointer-events:none}
.gift{font-size:140px;cursor:pointer;animation:shake 1.6s infinite,float 3s ease-in-out infinite;text-shadow:0 0 25px rgba(255,107,53,.9),0 0 50px rgba(255,165,0,.7);filter:drop-shadow(0 0 20px rgba(255,107,53,.6))}
@keyframes shake{25%{transform:rotate(-5deg)}50%{transform:rotate(5deg)}75%{transform:rotate(-3deg)}}
@keyframes float{0%,100%{transform:translateY(0px)}50%{transform:translateY(-20px)}}
.card{max-width:900px;width:95%;background:linear-gradient(135deg,rgba(255,107,53,.35),rgba(255,165,0,.22));backdrop-filter:blur(25px);padding:50px;border-radius:35px;text-align:center;box-shadow:0 0 80px rgba(255,107,53,.6),0 40px 80px rgba(255,99,71,.35),inset 0 0 50px rgba(255,255,255,.2);border:2px solid rgba(255,200,124,.5);color:#fff}
h1{font-family:'Great Vibes',cursive;font-size:3.2em;margin-bottom:20px;letter-spacing:2px;text-shadow:0 0 25px rgba(255,107,53,.9),0 5px 10px rgba(0,0,0,.4);font-weight:400}
h2{font-family:'Great Vibes',cursive;font-size:2.2em;margin:15px 0;text-shadow:0 0 20px rgba(255,107,53,.8),0 3px 8px rgba(0,0,0,.3);font-weight:400}
p{font-size:1.15em;letter-spacing:.5px}
img{width:340px;height:450px;object-fit:cover;border-radius:22px;border:7px solid rgba(255,255,255,.95);transition:.6s opacity,.3s transform;box-shadow:0 0 50px rgba(255,107,53,.7),0 20px 50px rgba(255,99,71,.45);opacity:1}
img:hover{transform:scale(1.08);box-shadow:0 0 70px rgba(255,107,53,1),0 25px 60px rgba(255,99,71,.6)}
button{margin:14px;padding:15px 32px;border:none;border-radius:40px;background:linear-gradient(135deg,#ff6b35,#ff8c42);color:#fff;font-weight:600;cursor:pointer;box-shadow:0 6px 25px rgba(255,107,53,.6);transition:.3s;border:1.5px solid rgba(255,255,255,.5);font-size:1.05em;font-family:'Poppins',sans-serif}
button:hover{box-shadow:0 10px 35px rgba(255,107,53,.9);transform:translateY(-4px);background:linear-gradient(135deg,#ff8c42,#ffa500)}
button:active{transform:translateY(-1px)}
#text{margin:25px auto;line-height:2.2;max-width:750px;min-height:140px;text-shadow:0 2px 4px rgba(0,0,0,.2);font-size:1.1em}
.float{position:fixed;bottom:-30px;font-size:36px;animation:up 7s linear forwards;filter:drop-shadow(0 0 20px rgba(255,107,53,.8))}
@keyframes up{to{transform:translateY(-120vh) rotate(360deg);opacity:0}}
#letterPage .card{max-width:850px;max-height:75vh;overflow:auto}
#letterPage .card h1{text-align:center}
#typed{white-space:pre-wrap;line-height:2.4;text-shadow:0 2px 4px rgba(0,0,0,.2);font-size:1.08em;letter-spacing:.3px}
@media (max-width:768px){
h1{font-size:2.2em;margin-bottom:15px}
h2{font-size:1.5em;margin:10px 0}
p{font-size:1em}
.card{padding:30px;border-radius:25px;display:flex;flex-direction:column}
img{width:280px;height:370px;border:5px solid rgba(255,255,255,.95)}
button{padding:12px 24px;font-size:.95em;margin:8px 5px;flex-shrink:0}
#text{font-size:0.95em;margin:15px auto;min-height:100px;line-height:2}
.gift{font-size:100px}
#typed{font-size:0.95em;line-height:2.2}
}
@media (max-width:480px){
body{overflow-y:auto}
.page{position:relative;height:auto;min-height:100vh;display:flex;justify-content:flex-start;align-items:center;padding:20px 15px;padding-top:40px}
.page.hide{display:none}
h1{font-size:1.6em;margin-bottom:12px}
h2{font-size:1.1em;margin:8px 0;color:#fff}
p{font-size:0.9em;margin:5px 0}
.card{width:100%;padding:20px;border-radius:20px;margin:10px 0;box-shadow:0 0 60px rgba(255,107,53,.5),0 20px 50px rgba(255,99,71,.3);display:flex;flex-direction:column;align-items:center;gap:12px;max-width:100%}
img{width:100%;max-width:280px;height:auto;aspect-ratio:3/4;border:5px solid rgba(255,255,255,.95);border-radius:15px;object-fit:cover}
#text{font-size:0.88em;line-height:2;margin:10px 0;text-align:center}
button{width:100%;padding:13px 16px;font-size:0.9em;margin:6px 0;border-radius:25px}
.gift{font-size:70px;margin-bottom:15px;margin-top:20px}
#letterPage .card{width:100%;padding:20px;max-height:85vh;overflow-y:auto;border-radius:20px}
#typed{font-size:0.88em;line-height:2.2;text-align:left}
.float{font-size:24px}
}
</style>
</head>
<body>

<div class="page" id="intro">
<div class="gift" onclick="start()">🎁</div>
<h2>Tap the Gift</h2>
<p>Your surprise is waiting...</p>
</div>

<div class="page hide" id="viewer">
<div class="card">
<h1>Happy Birthday 🧡</h1>
<h2 id="title"></h2>
<img id="photo" src="photo1.jpeg">
<p id="text"></p>
<div>
<button onclick="prev()">⬅ Previous</button>
<button onclick="alert(memories[i].note)">💌 Secret Note</button>
<button onclick="next()">Next ➜</button>
</div>
</div>
</div>

<div class="page hide" id="letterPage">
<div class="card">
<h1>To My Dearest Niki ❤️</h1>
<p id="typed"></p>
</div>
</div>

<audio id="music" loop><source src="music.mp3" type="audio/mpeg"></audio>

<script>
const memories=[
{image:"photo1.jpeg",title:"Our First Memory",text:"Every picture with you reminds me that some moments become unforgettable simply because you were there. Thank you for filling my life with memories I'll always treasure.",note:"You'll always be my favorite person."},
{image:"photo2.jpeg",title:"Your Smile",text:"You have this incredible way of making ordinary days feel extraordinary. Even the smallest moments become my favorites when I'm with you.",note:"Your smile is my favorite view."},
{image:"photo3.jpeg",title:"More Adventures",text:"I hope one day we can look back at these photos together and smile, knowing they were only the beginning of countless beautiful memories.",note:"Let's make thousands more memories."},
{image:"photo4.jpeg",title:"Thank You",text:"Thank you for believing in me, being patient with me, and loving me. You inspire me to become a better person every day.",note:"Thank you for choosing me."},
{image:"photo5.jpeg",title:"Us",text:"No matter what happens in the future, I hope we never stop laughing together, dreaming together, and choosing each other every single day.",note:"I'll keep choosing you."},
{image:"photo6.jpeg",title:"One Last Thing...",text:"Before this birthday comes to an end, there's something I've wanted to tell you from the bottom of my heart. Click Next one last time. ❤️",note:"Ready?"}
];

const letter=`When I realized your birthday was approaching, I couldn't stop thinking about what gift I should give you. I came across a few options, like a necklace, earrings, a bracelet, or even something as simple as a shirt, but somehow none of them truly felt right.

Then I had an epiphany. A gift is a way for someone to express their love to someone significant in their life. And that's why I made this gift, so I can express my love to you even when I'm not beside you. Even when you feel like you don't deserve to be loved. Even when you feel like the whole world is against you.

I hope this little website reminds you that you'll always have someone cheering for you, believing in you, and loving you.

I love you, Niki, and I hope I always will. ❤️`;

let i=0,t=0,isTransitioning=false;
function start(){intro.classList.add('hide');viewer.classList.remove('hide');music.play().catch(()=>{});render();setInterval(f,350);}
function render(){isTransitioning=true;photo.style.opacity='0';setTimeout(()=>{photo.src=memories[i].image;photo.style.opacity='1';isTransitioning=false;},300);title.textContent=memories[i].title;text.textContent=memories[i].text;}
function next(){if(!isTransitioning){if(i<memories.length-1){i++;render();}else{isTransitioning=true;viewer.classList.add('hide');letterPage.classList.remove('hide');type();}}}
function prev(){if(!isTransitioning&&i>0){i--;render();}}
function type(){typed.textContent=letter;}
function f(){let d=document.createElement('div');d.className='float';d.innerHTML=Math.random()>.5?'🧡':'✨';d.style.left=Math.random()*100+'vw';document.body.appendChild(d);setTimeout(()=>d.remove(),7000);}
</script>
</body>
</html>
